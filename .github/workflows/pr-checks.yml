name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend-build:
    name: "Frontend — TypeScript & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (catches TypeScript errors)
        run: npm run build

  # ─── Backend compile ────────────────────────────────────────────────────────
  backend-compile:
    name: "Backend — Compile"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      - name: Compile
        run: mvn compile -DskipTests --no-transfer-progress

  # ─── Backend tests ──────────────────────────────────────────────────────────
  backend-test:
    name: "Backend — Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: ecommerce_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root --password=ci_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: mvn test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: ci_password
