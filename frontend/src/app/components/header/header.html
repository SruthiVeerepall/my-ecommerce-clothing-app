<header class="header">
  <div class="logo">
    <img src="clothing-image.jpeg" alt="VR Boutique Logo" class="logo-img">
  </div>
  <nav class="nav">
    <a (click)="router.navigate(['/'])" class="nav-link" style="cursor: pointer;">🏠 Home</a>
    <a (click)="router.navigate(['/shop'])" class="nav-link" style="cursor: pointer;">🛍️ Shop</a>
    <a (click)="router.navigate(['/about'])" class="nav-link" style="cursor: pointer;">ℹ️ About</a>
    <a (click)="router.navigate(['/help'])" class="nav-link" style="cursor: pointer;">🎧 Help</a>
  </nav>
  <div class="actions">
    <button class="btn admin-btn" *ngIf="isAdmin" (click)="navigateToAdmin()" title="Admin Panel">⚙️ Admin</button>
    <div class="search-bar">
      <input type="text" placeholder="Search...">
      <button class="search-btn">🔍</button>
    </div>
    <button class="btn cart-btn" (click)="navigateToCart()">
      🛒
      <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
    </button>
    <button class="btn auth-btn" *ngIf="!isAuthenticated" (click)="navigateToLogin()" title="Login">
      <span class="auth-icon" aria-hidden="true">🔐</span>
    </button>
    <button class="btn auth-btn" *ngIf="isAuthenticated" (click)="logout()" title="Logout">
      <span class="auth-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h4"></path>
          <path d="M16 7l4 5-4 5"></path>
          <path d="M20 12H9"></path>
          <path d="M13 4.5a1.5 1.5 0 0 1 0 3"></path>
        </svg>
      </span>
    </button>
  </div>
</header>
