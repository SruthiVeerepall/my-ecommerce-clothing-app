<div class="register-container">
  <div class="register-card">
    <!-- Step 1: registration form -->
    <ng-container *ngIf="!awaitingCode()">
      <h2>Create Account</h2>

      <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="user.username"
            name="username"
            required
            placeholder="Choose a username"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="user.email"
            name="email"
            required
            placeholder="Enter your email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              [(ngModel)]="user.password"
              name="password"
              required
              placeholder="Create a password"
            />
            <button
              type="button"
              class="toggle-password-btn"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              <svg
                *ngIf="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg
                *ngIf="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              [(ngModel)]="user.confirmPassword"
              name="confirmPassword"
              required
              placeholder="Confirm your password"
            />
            <button
              type="button"
              class="toggle-password-btn"
              (click)="toggleConfirmPasswordVisibility()"
              [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
            >
              <svg
                *ngIf="showConfirmPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg
                *ngIf="!showConfirmPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="loading()" class="register-btn">
          {{ loading() ? 'Sending code...' : 'Register' }}
        </button>
      </form>

      <div class="login-link">
        <p>Already have an account?
          <button type="button" (click)="navigateToLogin()" class="link-btn">Login here</button>
        </p>
      </div>
    </ng-container>

    <!-- Step 2: enter the emailed verification code -->
    <ng-container *ngIf="awaitingCode()">
      <h2>Verify Your Email</h2>

      <div *ngIf="infoMessage()" class="success-message">
        {{ infoMessage() }}
      </div>

      <form (ngSubmit)="onVerify()">
        <div class="form-group">
          <label for="code">Verification Code</label>
          <input
            type="text"
            id="code"
            [(ngModel)]="code"
            name="code"
            inputmode="numeric"
            maxlength="6"
            required
            placeholder="Enter the 6-digit code"
          />
        </div>

        <button type="submit" [disabled]="loading()" class="register-btn">
          {{ loading() ? 'Verifying...' : 'Verify & Create Account' }}
        </button>
      </form>

      <div class="login-link">
        <p>Didn't get the code?
          <button type="button" (click)="onResend()" class="link-btn">Resend code</button>
        </p>
      </div>
    </ng-container>

    <div *ngIf="errorMessage()" class="error-message">
      {{ errorMessage() }}
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" *ngIf="showSuccessModal()" (click)="onOverlayClick($event)">
  <div class="modal-box">
    <div class="modal-icon">&#10003;</div>
    <h3 class="modal-title">Account Created!</h3>
    <p class="modal-message">Your email has been verified and your account is ready. You can now log in.</p>
    <button class="modal-btn" (click)="navigateToLogin()">Go to Login</button>
  </div>
</div>
