<div class="forgot-container">
  <div class="forgot-card">
    <!-- Step 1: request a reset code -->
    <ng-container *ngIf="!awaitingCode()">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your account email and we'll send you a reset code.</p>

      <form (ngSubmit)="onRequest()">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            required
            placeholder="Enter your email"
          />
        </div>

        <button type="submit" [disabled]="loading()" class="forgot-btn">
          {{ loading() ? 'Sending code...' : 'Send Reset Code' }}
        </button>
      </form>
    </ng-container>

    <!-- Step 2: enter code + new password -->
    <ng-container *ngIf="awaitingCode()">
      <h2>Reset Password</h2>

      <div *ngIf="infoMessage()" class="success-message">
        {{ infoMessage() }}
      </div>

      <form (ngSubmit)="onReset()">
        <div class="form-group">
          <label for="code">Reset Code</label>
          <input
            type="text"
            id="code"
            [(ngModel)]="code"
            name="code"
            inputmode="numeric"
            maxlength="6"
            required
            placeholder="Enter the 6-digit code"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="newPassword"
              [(ngModel)]="newPassword"
              name="newPassword"
              required
              placeholder="Create a new password"
            />
            <button
              type="button"
              class="toggle-password-btn"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            >
              <svg
                *ngIf="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg
                *ngIf="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              placeholder="Confirm your new password"
            />
            <button
              type="button"
              class="toggle-password-btn"
              (click)="toggleConfirmPasswordVisibility()"
              [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
            >
              <svg
                *ngIf="showConfirmPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg
                *ngIf="!showConfirmPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="loading()" class="forgot-btn">
          {{ loading() ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>

      <div class="login-link">
        <p>Didn't get the code?
          <button type="button" (click)="onResend()" class="link-btn">Resend code</button>
        </p>
      </div>
    </ng-container>

    <div *ngIf="errorMessage()" class="error-message">
      {{ errorMessage() }}
    </div>

    <div class="login-link">
      <p>Remembered your password?
        <button type="button" (click)="navigateToLogin()" class="link-btn">Back to Login</button>
      </p>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" *ngIf="showSuccessModal()" (click)="onOverlayClick($event)">
  <div class="modal-box">
    <div class="modal-icon">&#10003;</div>
    <h3 class="modal-title">Password Reset!</h3>
    <p class="modal-message">Your password has been updated. You can now log in with your new password.</p>
    <button class="modal-btn" (click)="navigateToLogin()">Go to Login</button>
  </div>
</div>
